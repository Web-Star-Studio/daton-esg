name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync backend dependencies
        run: cd backend && uv sync --locked

      - name: Ruff lint
        run: cd backend && uv run ruff check .

      - name: Ruff format check
        run: cd backend && uv run ruff format --check .

      - name: Pytest
        run: cd backend && uv run pytest --tb=short

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: ESLint
        run: cd frontend && pnpm lint

      - name: Prettier check
        run: cd frontend && pnpm format:check

      - name: Vitest
        run: cd frontend && pnpm test --run
