services:
  frontend:
    image: node:22-bookworm
    working_dir: /app/frontend
    env_file:
      - .env
    environment:
      VITE_AWS_COGNITO_REGION: ${VITE_AWS_COGNITO_REGION}
      VITE_AWS_COGNITO_USER_POOL_ID: ${VITE_AWS_COGNITO_USER_POOL_ID}
      VITE_AWS_COGNITO_APP_CLIENT_ID: ${VITE_AWS_COGNITO_APP_CLIENT_ID}
      VITE_API_PROXY_TARGET: http://api:8000
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm dev --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      BACKEND_PORT: ${BACKEND_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: ${DATABASE_URL}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4566/_localstack/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  frontend_node_modules:
  postgres_data:
  localstack_data:
