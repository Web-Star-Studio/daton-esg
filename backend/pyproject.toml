[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "worton-esg-backend"
version = "0.1.0"
description = "FastAPI backend skeleton for the Daton ESG platform."
requires-python = ">=3.12"
dependencies = [
  "alembic>=1.16,<2.0",
  "asyncpg>=0.30,<1.0",
  "fastapi>=0.115,<1.0",
  "greenlet>=3.2,<4.0",
  "uvicorn[standard]>=0.30,<1.0",
  "pydantic-settings>=2.4,<3.0",
  "sqlalchemy>=2.0.36,<3.0",
  "structlog>=24.4,<26.0",
]

[tool.setuptools.packages.find]
include = ["app*"]
